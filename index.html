<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제안서 생성기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273548;
      --border: #334155;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-light: #818cf8;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --success: #10b981;
      --error: #f87171;
      --radius: 10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent-light);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 .badge {
      background: var(--accent);
      color: white;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="password"],
    textarea,
    select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 14px;
      transition: border-color 0.2s;
      font-family: inherit;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea {
      min-height: 180px;
      line-height: 1.6;
    }

    .api-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .api-row > div:first-child { flex: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) { background: var(--border); }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-lg {
      padding: 14px 32px;
      font-size: 1rem;
      width: 100%;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
    }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    .tag-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    #generateBtn {
      position: relative;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #resultCard {
      display: none;
    }

    #resultCard.visible {
      display: block;
    }

    #resultText {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.8;
      min-height: 200px;
      max-height: 600px;
      overflow-y: auto;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }

    .alert.visible { display: block; }
    .alert-error { background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .alert-success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--success); }

    .key-saved-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      margin-left: 6px;
      vertical-align: middle;
    }

    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .tone-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .chip {
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chip.selected {
      border-color: var(--accent);
      background: rgba(99,102,241,0.15);
      color: var(--accent-light);
    }
  </style>
</head>
<body>

<header>
  <h1>✦ 제안서 생성기</h1>
  <p>기존 제안서 양식을 참고하여 새로운 제안서를 자동으로 작성합니다</p>
</header>

<div class="container">

  <!-- API Key -->
  <div class="card">
    <h2>🔑 Gemini API 키 <span class="badge">필수</span></h2>
    <div class="api-row">
      <div>
        <label for="apiKey">Google AI Studio API 키</label>
        <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
      </div>
      <button class="btn btn-secondary" onclick="saveKey()">저장</button>
    </div>
    <div id="keyAlert" class="alert"></div>
  </div>

  <!-- Template -->
  <div class="card">
    <h2>📄 제안서 양식 (참고 템플릿)</h2>
    <div class="field">
      <label for="templateText">기존 제안서를 붙여넣거나 직접 입력해주세요</label>
      <textarea id="templateText" placeholder="예시)

[회사명] 귀중

제안서 제목: ○○○ 서비스 도입 제안

1. 제안 배경
   ...

2. 제안 내용
   ...

3. 기대 효과
   ...

위와 같이 제안드립니다."></textarea>
    </div>
  </div>

  <!-- New Proposal Details -->
  <div class="card">
    <h2>✏️ 새 제안서 정보 입력</h2>

    <div class="grid-2">
      <div class="field">
        <label for="recipient">받는 회사 / 기관명</label>
        <input type="text" id="recipient" placeholder="예: (주)ABC 기업" />
      </div>
      <div class="field">
        <label for="sender">제안하는 회사 / 이름</label>
        <input type="text" id="sender" placeholder="예: 홍길동 / XYZ 솔루션" />
      </div>
    </div>

    <div class="field">
      <label for="topic">제안 주제 / 제목</label>
      <input type="text" id="topic" placeholder="예: AI 기반 고객 서비스 자동화 솔루션 도입 제안" />
    </div>

    <div class="field">
      <label for="details">핵심 내용 및 요청 사항</label>
      <textarea id="details" style="min-height:120px" placeholder="제안서에 포함할 주요 내용을 자유롭게 적어주세요.&#10;예: 현재 고객 응대에 인력이 부족함. AI 챗봇 도입으로 응대 시간 70% 단축 예상. 비용은 월 50만원. 3개월 무료 체험 제공."></textarea>
    </div>

    <div class="section-divider"></div>

    <div class="field">
      <label>문서 톤</label>
      <div class="tone-chips">
        <span class="chip selected" data-tone="formal">공식적/격식체</span>
        <span class="chip" data-tone="friendly">친근하고 설득력 있는</span>
        <span class="chip" data-tone="technical">기술적/전문적</span>
        <span class="chip" data-tone="concise">간결하고 명확한</span>
      </div>
    </div>

    <div class="field">
      <label for="extraInstruction">추가 지시사항 (선택)</label>
      <input type="text" id="extraInstruction" placeholder="예: 표를 포함해주세요 / 3페이지 분량으로 / 영문 버전도 함께" />
    </div>
  </div>

  <!-- Generate Button -->
  <button class="btn btn-primary btn-lg" id="generateBtn" onclick="generate()">
    ✦ 제안서 생성하기
  </button>

  <div id="errorAlert" class="alert alert-error"></div>

  <!-- Result -->
  <div class="card" id="resultCard">
    <h2>📋 생성된 제안서</h2>
    <div id="resultText"></div>
    <div class="result-actions">
      <button class="btn btn-secondary" onclick="copyResult()">📋 복사</button>
      <button class="btn btn-secondary" onclick="downloadResult()">⬇️ 텍스트 다운로드</button>
      <button class="btn btn-secondary" onclick="regenerate()">🔄 다시 생성</button>
    </div>
  </div>

</div>

<script>
  const MODEL = 'gemini-2.5-flash-preview-05-20';
  let selectedTone = 'formal';
  let lastResult = '';

  // Tone chip selection
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      selectedTone = chip.dataset.tone;
    });
  });

  // Load saved key
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('gemini_api_key');
    if (saved) {
      document.getElementById('apiKey').value = saved;
      showKeyAlert('저장된 API 키를 불러왔습니다.', 'success');
    }
  });

  function saveKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) { showKeyAlert('API 키를 입력해주세요.', 'error'); return; }
    localStorage.setItem('gemini_api_key', key);
    showKeyAlert('API 키가 저장되었습니다. ✓', 'success');
  }

  function showKeyAlert(msg, type) {
    const el = document.getElementById('keyAlert');
    el.textContent = msg;
    el.className = `alert alert-${type} visible`;
    setTimeout(() => el.classList.remove('visible'), 3000);
  }

  function showError(msg) {
    const el = document.getElementById('errorAlert');
    el.textContent = msg;
    el.className = 'alert alert-error visible';
  }

  function hideError() {
    document.getElementById('errorAlert').classList.remove('visible');
  }

  function setLoading(on) {
    const btn = document.getElementById('generateBtn');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span> 생성 중...'
      : '✦ 제안서 생성하기';
  }

  const toneMap = {
    formal: '공식적이고 격식 있는 문체',
    friendly: '친근하고 설득력 있는 문체',
    technical: '기술적이고 전문적인 문체',
    concise: '간결하고 명확한 문체',
  };

  async function generate() {
    hideError();

    const apiKey = document.getElementById('apiKey').value.trim();
    const template = document.getElementById('templateText').value.trim();
    const recipient = document.getElementById('recipient').value.trim();
    const sender = document.getElementById('sender').value.trim();
    const topic = document.getElementById('topic').value.trim();
    const details = document.getElementById('details').value.trim();
    const extra = document.getElementById('extraInstruction').value.trim();

    if (!apiKey) { showError('Gemini API 키를 입력해주세요.'); return; }
    if (!template) { showError('참고할 제안서 양식을 입력해주세요.'); return; }
    if (!topic) { showError('제안 주제를 입력해주세요.'); return; }

    const prompt = `당신은 전문 제안서 작성 전문가입니다.

아래 [참고 양식]을 기반으로, [새 제안서 정보]에 맞는 새로운 제안서를 작성해주세요.

## 작성 규칙
- 참고 양식의 구조, 섹션 순서, 형식을 최대한 따르되 내용은 새 정보에 맞게 완전히 새로 작성
- 문체: ${toneMap[selectedTone]}
- 빈칸이나 플레이스홀더 없이 완성된 제안서를 작성
${extra ? `- 추가 지시: ${extra}` : ''}

## [참고 양식]
${template}

## [새 제안서 정보]
- 받는 곳: ${recipient || '(미입력)'}
- 제안자: ${sender || '(미입력)'}
- 제안 주제: ${topic}
- 핵심 내용: ${details || '(미입력, 주제에 맞게 적절히 작성)'}

## [완성된 제안서]
`;

    setLoading(true);

    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err?.error?.message || `HTTP ${res.status}`;
        throw new Error(msg);
      }

      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error('응답에서 텍스트를 찾을 수 없습니다.');

      lastResult = text;
      document.getElementById('resultText').textContent = text;
      document.getElementById('resultCard').classList.add('visible');
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (e) {
      showError('오류: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  function copyResult() {
    navigator.clipboard.writeText(lastResult).then(() => {
      const btn = event.target;
      btn.textContent = '✓ 복사됨';
      setTimeout(() => btn.textContent = '📋 복사', 2000);
    });
  }

  function downloadResult() {
    const blob = new Blob([lastResult], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '제안서.txt';
    a.click();
  }

  function regenerate() {
    document.getElementById('resultCard').classList.remove('visible');
    generate();
  }
</script>

</body>
</html>
